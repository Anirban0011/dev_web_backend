name: Cleanup PR Environments

on:
  pull_request:
    types: [closed]

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete GitHub Environment
        run: |
          ENV_NAME="${{ github.head_ref }} - ${{ github.event.repository.name }} PR #${{ github.event.number }}"
          ENCODED=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$ENV_NAME', safe=''))")
          gh api -X DELETE /repos/${{ github.repository }}/environments/$ENCODED
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}