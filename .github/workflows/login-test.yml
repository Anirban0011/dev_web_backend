name: Login Flow Test
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - run: npm install
      - run: |
          echo "Waking up backend..."
          curl --silent ${{ vars.BASE_ENDPOINT }} > /dev/null
          sleep 60
      - run: node tests/login.test.js
        env:
          BASE_URL: ${{vars.BASE_ENDPOINT}}
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}