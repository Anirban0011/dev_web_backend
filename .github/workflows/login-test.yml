name: Login Flow Test
on:
  push:
    branches: [ "test/**" ]

jobs:
  login-flow-test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    env:
          API_VERSION: ${{ vars.API_VERSION }}
          BASE_URL: ${{ vars.BASE_URL }}
          CORS_ORIGIN: ${{ vars.CORS_ORIGIN }}
          PORT: ${{ vars.PORT }}
          ACCESS_TOKEN_EXPIRY: ${{ vars.ACCESS_TOKEN_EXPIRY }}
          REFRESH_TOKEN_EXPIRY: ${{ vars.REFRESH_TOKEN_EXPIRY }}

          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          REFRESH_TOKEN_SECRET: ${{ secrets.REFRESH_TOKEN_SECRET }}

          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          base : master
          filters: |
            logic:
              - '**/*.js'
              - 'package.json'
              - '.github/workflows/login-test.yml'
      - if: steps.changes.outputs.logic == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - if: steps.changes.outputs.logic == 'true'
        run: |
          npm install
          npm run start &
          npx wait-on ${{ vars.BASE_URL }} # wait for backend server
          node tests/login.test.js

  create-pr:
    needs: login-flow-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    if: success()
    steps:
      - uses: actions/checkout@v4
      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.AUTO_PR_TOKEN }}
        run: |
          gh pr create \
            --title "Auto PR: ${{ github.ref_name }}" \
            --body "Automated PR from ${{ github.ref_name }}" \
            --base master \
            --head ${{ github.ref_name }}
          sleep 5
          gh pr merge --auto --squash "${{ github.ref_name }}"
